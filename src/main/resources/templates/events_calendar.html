<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Sports Event Calendar</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: white;
        }

        nav {
            background: gray;
            padding: 10px;
            margin-bottom: 20px;
        }

        nav a {
            color: white;
            margin-right: 15px;
            text-decoration: none;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th, td {
            padding: 12px;
            border: 1px black;
            text-align: left;
        }

        th {
            background-color: white;
        }

        .btn {
            padding: 8px 12px;
            background: green;
            color: white;
            text-decoration: none;
            border-radius: 4px;
        }
    </style>
</head>
<body>

<nav>
    <a th:href="@{/events}">Home</a>
    <a href="#">Sports</a>
    <a href="#">About</a>
</nav>

<h1>Event Calendar</h1>

<div style="margin-bottom: 20px;">
    <a th:href="@{/events/new}" class="btn">Add New Event</a>
</div>

<table>
    <thead>
    <tr>
        <th>Date</th>
        <th>Time (UTC)</th>
        <th>Sport</th>
        <th>Matchup</th>
        <th>Stadium</th>
        <th>Status</th>
        <th>Details</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="event : ${events}">
        <td th:text="${event.date}"></td>
        <td th:text="${event.timeUTC}"></td>

        <td th:text="${event.participations != null and !event.participations.isEmpty() ? event.participations[0].team.sport.name : 'No Sport'}"></td>
        <td>
            <span th:each="part, iterStat : ${event.participations}">
                <span th:text="${part.team.officialName}"></span>
                <span th:if="${!iterStat.last}"> vs. </span>
            </span>
        </td>

        <td th:text="${event.stadium != null ? event.stadium.name : 'TBD'}"></td>
        <td th:text="${event.eventStatus != null ? event.eventStatus.name : ''}"></td>

        <td>
            <a th:href="@{/events/{id}(id=${event.id})}">View</a>
        </td>
    </tr>
    </tbody>
</table>

</body>
</html>
