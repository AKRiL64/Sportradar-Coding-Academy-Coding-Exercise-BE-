server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/sports_calendar
    username: admin
    password: admin
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update #auto-creation and updating of tables

    #setting to help with debugging
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  #setting to edite templates without restarting the server
  thymeleaf:
    cache: false